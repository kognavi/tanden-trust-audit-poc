version: 2
updates:
  # npm依存パッケージの脆弱性・更新チェック
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"

  # GitHub Actions自体の更新チェック
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
