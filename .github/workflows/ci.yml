name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Test and verify evidence
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run automated tests
        run: npm test

      - name: Validate sample evidence
        run: npm run validate:evidence

      - name: Generate sample evidence hash
        run: npm run hash

      - name: Verify sample evidence
        run: npm run verify
