name: Semgrep

on:
  pull_request: {}
  push:
    branches: ["main"]
  schedule:
    - cron: '0 3 * * 1'  # 毎週月曜3時(UTC)に定期スキャン

jobs:
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Semgrep
        run: semgrep ci
        env:
          # OSS向け公開ルールセットを使用（無料・トークン不要）
          SEMGREP_RULES: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten
            p/javascript
