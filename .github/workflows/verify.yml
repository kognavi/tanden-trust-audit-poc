name: Verify Evidence Integrity

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Show Node.js version
        run: node -v

      - name: Run tests
        run: npm test

      - name: Hash evidence
        run: npm run hash

      - name: Verify evidence
        run: npm run verify
